<form inputmode="text" class="form-group mb-3">
  <label for="nombre" class="form-label">Inserta tu Pokémon</label>
  <input type="text" id="nombre" class="form-control" [(ngModel)]="nuevoPokemon.nombre" placeholder="Nombre del Pokémon" name="nombre" />
  <input type="text" class="form-control" [(ngModel)]="nuevoPokemon.tipo" name="tipo" placeholder="Tipo del Pokémon" />
  <input type="text" class="form-control" [(ngModel)]="nuevoPokemon.urlImagen" name="urlImagen" placeholder="URL de la imagen del Pokémon" />
  <input type="submit" class="btn btn-primary mt-3" value="Agregar Pokémon" (click)="cargarPokemon()" />
</form>
